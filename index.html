<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Tree Apothecary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --moss: #5a6e4a;
    --sage-light: #c5d4b8;
    --cream: #f5f0e8;
    --parchment: #ede6d6;
    --bark: #3d2e1e;
    --fog: #9aa89c;
    --warm-white: #faf7f2;
    --clay: #b5785a;
    --clay-light: #e8cfc0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--warm-white);
    color: var(--bark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .title {
    font-family: 'Lora', serif;
    font-size: 2rem;
    color: var(--moss);
    margin-bottom: 0.3rem;
    text-align: center;
  }
  .title em { font-style: italic; }
  .subtitle {
    font-size: 0.88rem;
    color: var(--fog);
    text-align: center;
    margin-bottom: 2.5rem;
    font-style: italic;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 420px;
  }
  .app-card {
    background: white;
    border: 1.5px solid var(--sage-light);
    border-radius: 16px;
    padding: 1.4rem 1.6rem;
    text-decoration: none;
    color: var(--bark);
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 2px 12px rgba(61,46,30,0.07);
    transition: all 0.2s;
  }
  .app-card:hover {
    border-color: var(--moss);
    box-shadow: 0 4px 20px rgba(90,110,74,0.15);
    transform: translateY(-2px);
  }
  .app-icon { font-size: 2.2rem; }
  .app-name {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 0.2rem;
  }
  .app-desc { font-size: 0.78rem; color: var(--fog); }
  .footer {
    margin-top: 2.5rem;
    font-size: 0.7rem;
    color: var(--fog);
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="title">🌿 <em>Mystic Tree</em></div>
  <div class="subtitle">Tools made for living gently</div>

  <div class="cards">
    <a class="app-card" href="mystic-tree-mood.html">
      <div class="app-icon">🌙</div>
      <div>
        <div class="app-name">Mood Tracker</div>
        <div class="app-desc">Three check-ins a day. The real shape of how you're doing.</div>
      </div>
    </a>
    <a class="app-card" href="mystic-tree-planner.html">
      <div class="app-icon">📋</div>
      <div>
        <div class="app-name">Daily Planner</div>
        <div class="app-desc">Crash, Flow, Fog, Medical, Errands — a plan for whatever today actually is.</div>
      </div>
    </a>
  </div>

  <div class="footer">made for Kelly · Mystic Tree Apothecary</div>
</body>
</html>
